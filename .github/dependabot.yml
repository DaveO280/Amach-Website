version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Europe/Dublin"
    # Only open PRs when GitHub Advisory Database flags a vulnerability.
    # Does NOT create PRs for every new version release — keeps noise low.
    versioning-strategy: increase-if-necessary
    open-pull-requests-limit: 5
    groups:
      security-updates:
        patterns: ["*"]
        update-types: ["minor", "patch"]
    # OpenZeppelin is intentionally pinned to exact 5.4.0: 5.5+ dropped
    # utils/ReentrancyGuardUpgradeable.sol, which SecureHealthProfileV1/V2 and
    # the deployed V3_FromV1 lineage import. Bumping breaks `hardhat compile`.
    # A future move to OZ 5.6+ must be a deliberate, storage-layout-validated
    # contract migration — not an automated bump. See PR #107.
    ignore:
      - dependency-name: "@openzeppelin/contracts"
      - dependency-name: "@openzeppelin/contracts-upgradeable"
    labels:
      - "security"
      - "dependencies"
    commit-message:
      prefix: "security"
